name: Build Windows desktop app

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"
          cache: "pip"

      - name: Upgrade pip
        shell: pwsh
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller
          python -m pip list

      - name: Verify source tree layout
        shell: pwsh
        run: |
          if (!(Test-Path "tarkett_scheduler/core.py")) { throw "Missing tarkett_scheduler/core.py. Upload the patch into the repository root, not into a nested folder." }
          if (!(Test-Path "desktop_app/main.py")) { throw "Missing desktop_app/main.py. Upload the patch into the repository root, not into a nested folder." }
          if (!(Test-Path "run_desktop_app.py")) { throw "Missing run_desktop_app.py" }
          if (!(Test-Path "scripts/check_ortools.py")) { throw "Missing scripts/check_ortools.py" }

      - name: Verify OR-Tools CP-SAT from source
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$PWD;$env:PYTHONPATH"
          python scripts/check_ortools.py

      - name: Generate demo data
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$PWD;$env:PYTHONPATH"
          python -m tarkett_scheduler.demo_data_generator

      - name: Build Windows application
        shell: pwsh
        run: python -m PyInstaller FactoryScheduler.spec --clean --noconfirm

      - name: Verify executable exists
        shell: pwsh
        run: |
          if (!(Test-Path "dist/TarkettFlowScheduler/TarkettFlowScheduler.exe")) { throw "Executable was not created" }

      - name: Create ZIP archive
        shell: pwsh
        run: Compress-Archive -Path dist\TarkettFlowScheduler\* -DestinationPath TarkettFlowScheduler-Windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TarkettFlowScheduler-Windows
          path: TarkettFlowScheduler-Windows.zip
