name: Build Windows desktop app

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11 x64
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Verify OR-Tools CP-SAT dependency
        run: python scripts/check_ortools.py

      - name: Generate demo data
        run: python -m tarkett_scheduler.demo_data_generator

      - name: Build executable
        run: pyinstaller FactoryScheduler.spec --clean --noconfirm

      - name: Verify built executable starts
        shell: pwsh
        run: |
          if (!(Test-Path "dist/TarkettFlowScheduler/TarkettFlowScheduler.exe")) {
            throw "Executable was not created"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TarkettFlowScheduler-Windows-CP-SAT
          path: dist/TarkettFlowScheduler
