name: Build Windows desktop app

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11 x64
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
          cache: 'pip'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip list

      - name: Verify source tree layout
        shell: pwsh
        run: |
          if (!(Test-Path "tarkett_scheduler/core.py")) { throw "Missing tarkett_scheduler/core.py. Patch may have been uploaded into a nested folder instead of repository root." }
          if (!(Test-Path "desktop_app/main.py")) { throw "Missing desktop_app/main.py. Patch may have been uploaded into a nested folder instead of repository root." }
          if (!(Test-Path "run_desktop_app.py")) { throw "Missing run_desktop_app.py" }

      - name: Verify OR-Tools CP-SAT dependency
        shell: pwsh
        run: |
          @'
          import sys
          from importlib.metadata import version
          from ortools.sat.python import cp_model

          print("Python:", sys.version)
          print("ortools:", version("ortools"))

          model = cp_model.CpModel()
          x = model.NewBoolVar("x")
          model.Maximize(x)
          solver = cp_model.CpSolver()
          solver.parameters.max_time_in_seconds = 2.0
          status = solver.Solve(model)

          print("CP-SAT status:", solver.StatusName(status), "x=", solver.Value(x))
          if status not in (cp_model.OPTIMAL, cp_model.FEASIBLE) or solver.Value(x) != 1:
              raise SystemExit("CP-SAT smoke model failed")
          '@ | python -

      - name: Verify project uses CP-SAT
        shell: pwsh
        run: python scripts/check_ortools.py

      - name: Generate demo data
        shell: pwsh
        run: python -m tarkett_scheduler.demo_data_generator

      - name: Build executable
        shell: pwsh
        run: python -m PyInstaller FactoryScheduler.spec --clean --noconfirm

      - name: Verify built executable contains CP-SAT
        shell: pwsh
        run: |
          if (!(Test-Path "dist/TarkettFlowScheduler/TarkettFlowScheduler.exe")) {
            throw "Executable was not created"
          }
          & "dist/TarkettFlowScheduler/TarkettFlowScheduler.exe" --smoke-test
          if ($LASTEXITCODE -ne 0) {
            throw "Bundled executable failed OR-Tools smoke test"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TarkettFlowScheduler-Windows-CP-SAT
          path: dist/TarkettFlowScheduler
